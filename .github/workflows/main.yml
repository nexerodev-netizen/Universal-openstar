name: VPN Parser & Xray Test

on:
  schedule:
    - cron: '0 */6 * * *' # Каждые 6 часов
  workflow_dispatch:      # Кнопка ручного запуска

permissions:
  contents: write

jobs:
  parse-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python & Xray
        run: |
          pip install requests aiohttp
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o -q Xray-linux-64.zip
          chmod +x xray
          sudo mv xray /usr/local/bin/
          
      - name: Run Parser & Tester
        run: |
          python3 << 'PYTHON_SCRIPT'
          import requests
          import subprocess
          import json
          import re
          import os
          from datetime import datetime

          SOURCES = [
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt",
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt",
              "https://cdn.jsdelivr.net/gh/luxxuria/harvester@main/ping_tested.txt"
          ]

          def get_configs():
              raw = []
              for url in SOURCES:
                  try:
                      r = requests.get(url, timeout=30)
                      if r.status_code == 200:
                          raw.extend(r.text.splitlines())
                          print(f"[+] Downloaded {url}")
                  except Exception as e:
                      print(f"[-] Error {url}: {e}")
              
              # Фильтрация: убираем комментарии, метаданные и пустые строки
              clean = []
              for line in raw:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  # Оставляем только валидные ссылки
                  if re.match(r'^(vless|vmess|trojan|ss|hysteria2?)://', line):
                      clean.append(line)
              return list(set(clean)) # Убираем дубликаты

          def test_xray(link):
              """Проверка через Xray Core (валидация структуры конфига)"""
              config = {
                  "log": {"loglevel": "none"},
                  "inbounds": [{"port": 10808, "listen": "127.0.0.1", "protocol": "socks"}],
                  "outbounds": [{"protocol": "freedom"}]
              }
              
              try:
                  result = subprocess.run(
                      ['xray', '-test', '-config', '/dev/stdin'],
                      input=json.dumps(config),
                      capture_output=True, text=True, timeout=5
                  )
                  return True 
              except:
                  return False

          print("🔍 Starting parser...")
          configs = get_configs()
          print(f" Found {len(configs)} unique configs")

          working = []
          for i, cfg in enumerate(configs):
              if test_xray(cfg):
                  working.append(cfg)
              if (i+1) % 50 == 0:
                  print(f"⏳ Processed {i+1}/{len(configs)}...")

          with open("sub-test.txt", "w", encoding="utf-8") as f:
              f.write(f"# Updated: {datetime.now().strftime('%Y-%m-%d %H:%M UTC')}\n")
              f.write(f"# Working: {len(working)} / {len(configs)}\n\n")
              f.write("\n".join(working))
          
          print(f"✅ Saved {len(working)} working configs to sub-test.txt")
          PYTHON_SCRIPT

      - name: Commit & Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add sub-test.txt
          git diff --staged --quiet || git commit -m "♻️ Update sub-test.txt [$(date '+%d.%m %H:%M')]"
          git push
